<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indonesia Blue Economy - Interactive Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sea-dark: #001219;
            --ocean: #005f73;
            --cyan: #94d2bd;
            --gold: #ee9b00;
        }

        body {
            background-color: var(--sea-dark);
            color: #e9d8a6;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* Gradient Background */
        .ocean-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0a9396 0%, #001219 100%);
            opacity: 0.4;
        }

        /* Glassmorphism */
        .glass {
            background: rgba(0, 18, 25, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 210, 189, 0.2);
            border-radius: 24px;
        }

        /* Canvas for dragging */
        #viewport { width: 100vw; height: 100vh; cursor: grab; position: relative; overflow: hidden; }
        #canvas { position: absolute; transform-origin: 0 0; will-change: transform; transition: transform 0.1s ease-out; }

        /* Floating Nodes */
        .node {
            position: absolute; width: 160px; pointer-events: auto;
            transition: scale 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .node:hover { scale: 1.1; z-index: 50; }

        .stat-card {
            padding: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Mobile Bottom Sheet */
        #drawer {
            position: fixed; bottom: 0; left: 0; right: 0; height: 75vh;
            background: #002129; border-radius: 30px 30px 0 0;
            transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000; padding: 25px; border-top: 2px solid var(--cyan);
        }
        #drawer.open { transform: translateY(0); }

        /* Unique Feature: Slider */
        .impact-slider {
            -webkit-appearance: none; width: 100%; height: 8px;
            background: var(--ocean); border-radius: 5px; outline: none;
        }
        .impact-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 24px; height: 24px;
            background: var(--gold); border-radius: 50%; cursor: pointer;
        }

        /* Pulse Animation */
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(148, 210, 189, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(148, 210, 189, 0); }
            100% { box-shadow: 0 0 0 0 rgba(148, 210, 189, 0); }
        }
        .pulse { animation: pulse-glow 2s infinite; }
    </style>
</head>
<body>

    <div class="ocean-bg"></div>

    <!-- UI Overlay -->
    <header class="fixed top-6 left-6 right-6 z-50 flex flex-col md:flex-row justify-between items-start gap-4 pointer-events-none">
        <div class="glass p-4 pointer-events-auto">
            <h1 class="text-xl font-extrabold text-white">EKONOMI BIRU <span class="text-[#94d2bd]">INDONESIA</span></h1>
            <p class="text-[10px] tracking-[0.2em] uppercase text-zinc-400 font-bold">Maritime Strategic Infographic</p>
        </div>

        <div class="glass p-3 flex items-center gap-4 pointer-events-auto">
            <div class="text-right">
                <p class="text-[9px] font-bold text-zinc-400 uppercase">Total Potensi</p>
                <p class="text-lg font-black text-[#ee9b00]">$1.33 Triliun</p>
            </div>
            <div class="w-px h-8 bg-white/10"></div>
            <button onclick="toggleSimulator()" class="bg-[#005f73] px-4 py-2 rounded-xl text-xs font-bold hover:bg-[#0a9396] transition-all">
                Simulasi Dampak
            </button>
        </div>
    </header>

    <div id="viewport">
        <div id="canvas">
            <!-- SVG Lines will be drawn here -->
            <svg id="svg-layer" style="position:absolute; top:-2000px; left:-2000px; width:4000px; height:4000px; pointer-events:none; opacity:0.3;"></svg>
            <div id="nodes-layer"></div>
        </div>
    </div>

    <!-- Bottom Drawer for Details -->
    <div id="drawer">
        <div class="w-12 h-1.5 bg-white/20 rounded-full mx-auto mb-6" onclick="closeDrawer()"></div>
        <div id="drawer-content" class="overflow-y-auto h-full pb-10">
            <!-- Dynamic Content -->
        </div>
    </div>

    <!-- Impact Simulator Modal -->
    <div id="sim-modal" class="fixed inset-0 z-[2000] bg-black/80 flex items-center justify-center p-6 hidden backdrop-blur-sm">
        <div class="glass max-w-md w-full p-8 space-y-6">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-bold">Simulator Investasi Biru</h3>
                <button onclick="toggleSimulator()" class="text-zinc-400"><i data-lucide="x"></i></button>
            </div>
            <p class="text-sm text-zinc-400">Geser untuk melihat estimasi penyerapan tenaga kerja jika potensi dioptimalkan:</p>
            
            <div class="space-y-4">
                <div class="flex justify-between font-bold">
                    <span>Optimasi Potensi</span>
                    <span id="sim-percent" class="text-gold">10%</span>
                </div>
                <input type="range" min="1" max="100" value="10" class="impact-slider" id="optim-slider">
            </div>

            <div class="grid grid-cols-2 gap-4 pt-4">
                <div class="bg-white/5 p-4 rounded-2xl">
                    <p class="text-[10px] uppercase font-bold text-zinc-500">Tenaga Kerja</p>
                    <p id="sim-jobs" class="text-xl font-black text-cyan">4.5 Juta</p>
                </div>
                <div class="bg-white/5 p-4 rounded-2xl">
                    <p class="text-[10px] uppercase font-bold text-zinc-500">Pemasukan Negara</p>
                    <p id="sim-revenue" class="text-xl font-black text-gold">$133 M</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const nodes = [
            { id: 'main', label: 'Ekonomi Biru', x: 0, y: 0, color: '#94d2bd', size: 'large', icon: 'anchor' },
            { id: 'latar', label: '71% Wilayah Laut', x: -250, y: -150, color: '#0a9396', icon: 'map' },
            { id: 'spesies', label: '37% Spesies Ikan', x: -280, y: 100, color: '#0a9396', icon: 'fish' },
            { id: 'pdb', label: '$27M Kontribusi PDB', x: 250, y: -180, color: '#ee9b00', icon: 'trending-up' },
            { id: 'ekspor', label: 'Ekspor Perikanan', x: 300, y: 50, color: '#ee9b00', icon: 'ship' },
            { id: 'sdgs', label: 'SDGs 2030', x: 50, y: 250, color: '#94d2bd', icon: 'globe' },
        ];

        let scale = window.innerWidth < 768 ? 0.7 : 1;
        let posX = window.innerWidth / 2;
        let posY = window.innerHeight / 2;
        const canvas = document.getElementById('canvas');
        const nodesLayer = document.getElementById('nodes-layer');

        function init() {
            renderNodes();
            setupInteractions();
            lucide.createIcons();
            updateTransform();
        }

        function renderNodes() {
            nodesLayer.innerHTML = '';
            nodes.forEach(node => {
                const div = document.createElement('div');
                div.className = `node glass stat-card ${node.size === 'large' ? 'pulse w-[200px]' : 'w-[150px]'}`;
                div.style.left = `${node.x}px`;
                div.style.top = `${node.y}px`;
                div.style.borderColor = node.color;
                
                div.innerHTML = `
                    <div class="flex flex-col items-center gap-2">
                        <i data-lucide="${node.icon}" style="color:${node.color}"></i>
                        <h3 class="text-xs font-bold text-white">${node.label}</h3>
                    </div>
                `;

                div.onclick = () => openDetails(node.id);
                nodesLayer.appendChild(div);
            });
        }

        // Interaction Logic
        function setupInteractions() {
            let isDragging = false;
            let startX, startY;

            window.addEventListener('pointerdown', e => {
                if(e.target.closest('.node, button, #drawer, #sim-modal')) return;
                isDragging = true;
                startX = e.clientX - posX;
                startY = e.clientY - posY;
            });

            window.addEventListener('pointermove', e => {
                if (!isDragging) return;
                posX = e.clientX - startX;
                posY = e.clientY - startY;
                updateTransform();
            });

            window.addEventListener('pointerup', () => isDragging = false);

            window.addEventListener('wheel', e => {
                const delta = e.deltaY * -0.001;
                scale = Math.min(Math.max(0.5, scale + delta), 2);
                updateTransform();
            });
        }

        function updateTransform() {
            canvas.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        // Unique Feature: Simulator Logic
        const slider = document.getElementById('optim-slider');
        slider.oninput = function() {
            const val = this.value;
            document.getElementById('sim-percent').innerText = val + '%';
            document.getElementById('sim-jobs').innerText = (val * 0.45).toFixed(1) + ' Juta';
            document.getElementById('sim-revenue').innerText = '$' + (val * 13.3).toFixed(1) + ' M';
        };

        function toggleSimulator() {
            document.getElementById('sim-modal').classList.toggle('hidden');
        }

        // Details Logic
        function openDetails(id) {
            const drawer = document.getElementById('drawer');
            const content = document.getElementById('drawer-content');
            
            const data = {
                'latar': { title: 'Geografi Maritim', body: 'Indonesia adalah negara kepulauan terbesar dengan 71% wilayah berupa lautan. Panjang garis pantai mencapai 99.083 km (terpanjang ke-2 di dunia).', img: '🌊' },
                'pdb': { title: 'Kontribusi PDB', body: 'Perikanan menyumbang $27 Miliar terhadap PDB nasional. Namun, pemanfaatan saat ini baru mencapai 10% dari total potensi ekonomi biru.', img: '📈' },
                'spesies': { title: 'Kekayaan Hayati', body: '37% spesies ikan dunia ada di Indonesia. Hal ini menjadikan Indonesia sebagai lumbung pangan laut global jika dikelola secara berkelanjutan.', img: '🐠' }
            };

            const item = data[id] || { title: 'Informasi Detail', body: 'Data ini mencakup strategi optimalisasi ekonomi biru sesuai target SDGs 2030 untuk pertumbuhan ekonomi inklusif.', img: '⚓' };

            content.innerHTML = `
                <div class="text-center mb-8">
                    <span class="text-6xl">${item.img}</span>
                    <h2 class="text-3xl font-black mt-4 text-white">${item.title}</h2>
                </div>
                <div class="space-y-6 text-zinc-300 leading-relaxed">
                    <p>${item.body}</p>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/5 p-4 rounded-xl border border-white/10 text-center">
                            <p class="text-xs font-bold text-gold uppercase">Urgensi</p>
                            <p class="text-xl font-black">Sangat Tinggi</p>
                        </div>
                        <div class="bg-white/5 p-4 rounded-xl border border-white/10 text-center">
                            <p class="text-xs font-bold text-cyan uppercase">Target</p>
                            <p class="text-xl font-black">2030</p>
                        </div>
                    </div>
                </div>
            `;
            drawer.classList.add('open');
        }

        function closeDrawer() {
            document.getElementById('drawer').classList.remove('open');
        }

        init();
    </script>
</body>
</html>
