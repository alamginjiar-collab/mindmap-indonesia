<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indonesia Social Engine - Unified Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050507;
            --accent: #0A84FF;
            --glass: rgba(20, 20, 25, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
            touch-action: none; /* Crucial for custom gesture handling */
        }

        .ambient-bg {
            position: fixed; inset: 0;
            background: 
                radial-gradient(circle at 20% 20%, rgba(10, 132, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(48, 209, 88, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        .apple-glass {
            background: var(--glass);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--border);
        }

        /* Canvas & Interaction */
        #viewport {
            width: 100vw;
            height: 100vh;
            cursor: grab;
            overflow: hidden;
            position: relative;
        }

        #viewport:active { cursor: grabbing; }

        #canvas-container {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
            pointer-events: none; /* Children will re-enable pointer events */
        }

        .node {
            position: absolute;
            pointer-events: auto;
            transition: transform 0.2s ease-out;
        }

        .node-card {
            width: 180px;
            padding: 16px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .node-card:hover {
            transform: translateY(-5px) scale(1.05);
            border-color: rgba(255,255,255,0.3);
        }

        /* Animated Lines */
        .flow-line {
            fill: none;
            stroke-width: 1.5;
            stroke-dasharray: 8, 12;
            animation: flowAnim 20s linear infinite;
            opacity: 0.2;
        }

        @keyframes flowAnim {
            from { stroke-dashoffset: 400; }
            to { stroke-dashoffset: 0; }
        }

        /* Drawer - Same on Mobile & Desktop */
        #detail-drawer {
            position: fixed;
            top: 10px; right: 10px; bottom: 10px;
            width: calc(100% - 20px);
            max-width: 450px;
            transform: translateX(120%);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
            border-radius: 32px;
        }

        #detail-drawer.open { transform: translateX(0); }

        .impact-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }

        .impact-fill { height: 100%; transition: width 1s ease-in-out; }

        .ui-hide { transition: opacity 0.5s; }
        .focus-mode .ui-hide { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>

    <!-- Header -->
    <header class="ui-hide fixed top-6 left-6 z-50">
        <div class="flex items-center gap-4">
            <div class="apple-glass p-3 rounded-2xl shadow-2xl">
                <i data-lucide="component" class="w-6 h-6 text-blue-500"></i>
            </div>
            <div>
                <h1 class="text-lg font-black tracking-tighter">INDONESIA SOCIAL ENGINE</h1>
                <p class="text-[10px] text-zinc-500 font-bold tracking-[0.2em] uppercase">Interactive Infographic v2.0</p>
            </div>
        </div>
    </header>

    <!-- Main Viewport -->
    <div id="viewport">
        <div id="canvas-container">
            <svg id="svg-layer" style="position:absolute; top:0; left:0; width:5000px; height:5000px; pointer-events:none;"></svg>
            <div id="nodes-layer"></div>
        </div>
    </div>

    <!-- Controls -->
    <div class="ui-hide fixed bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-3 z-50">
        <div class="apple-glass p-2 rounded-2xl flex items-center gap-2 shadow-2xl">
            <button onclick="applyZoom(0.2)" class="p-3 hover:bg-white/10 rounded-xl"><i data-lucide="plus" class="w-5 h-5"></i></button>
            <button onclick="applyZoom(-0.2)" class="p-3 hover:bg-white/10 rounded-xl"><i data-lucide="minus" class="w-5 h-5"></i></button>
            <div class="w-px h-6 bg-white/10 mx-1"></div>
            <button onclick="resetView()" class="p-3 hover:bg-white/10 rounded-xl"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
            <button id="focus-btn" class="p-3 hover:bg-white/10 rounded-xl"><i data-lucide="eye-off" class="w-5 h-5"></i></button>
        </div>
    </div>

    <!-- Detail Drawer -->
    <aside id="detail-drawer" class="apple-glass flex flex-col shadow-2xl">
        <div class="p-8 border-b border-white/5 flex justify-between items-center">
            <div>
                <span id="drawer-tag" class="text-[10px] font-black tracking-widest text-blue-500 uppercase">Analisis Isu</span>
                <h2 id="drawer-title" class="text-2xl font-bold mt-1">Judul</h2>
            </div>
            <button id="close-drawer" class="p-4 hover:bg-white/10 rounded-full transition-all">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>
        <div id="drawer-content" class="flex-1 overflow-y-auto p-10 space-y-10">
            <!-- Content -->
        </div>
    </aside>

    <script>
        // --- DATA ---
        const data = {
            id: "root", label: "INDONESIA\nHUB",
            children: [
                {
                    label: "Ekonomi & Digital", color: "#0A84FF", icon: "zap",
                    children: [
                        { label: "Judi Online", impact: 95, stats: "Rp 327 Triliun", causes: ["Pinjol ilegal", "Iklan agresif"], solutions: ["Blokir IP", "Literasi Digital"] },
                        { label: "Pengangguran Gen Z", impact: 82, stats: "9.9 Juta NEET", causes: ["Mismatch skill", "Otomasi"], solutions: ["Link & Match SMK", "Insentif Startup"] }
                    ]
                },
                {
                    label: "Lingkungan", color: "#30D158", icon: "leaf",
                    children: [
                        { label: "Polusi Udara", impact: 88, stats: "AQI > 150", causes: ["PLTU Batubara", "Transportasi"], solutions: ["EV Transition", "Pajak Karbon"] },
                        { label: "Mafia Tanah", impact: 76, stats: "Ribuan Konflik", causes: ["Sertifikat Manual", "Oknum"], solutions: ["Blockchain Land", "Satgas Anti-Mafia"] }
                    ]
                },
                {
                    label: "Hukum & Etika", color: "#FF9F0A", icon: "shield",
                    children: [
                        { label: "Korupsi Politik", impact: 98, stats: "IPK Skor 34", causes: ["Biaya Politik", "Nepotisme"], solutions: ["UU Perampasan Aset", "Meritokrasi"] },
                        { label: "Kebocoran Data", impact: 85, stats: "PDN Kompromi", causes: ["Server Lemah", "SDM IT"], solutions: ["Audit Siber", "Sovereign Cloud"] }
                    ]
                }
            ]
        };

        // --- ENGINE ---
        let scale = 0.8;
        let posX = window.innerWidth / 2;
        let posY = window.innerHeight / 2;
        let isDragging = false;
        let startX, startY;
        let initialPinchDist = null;

        const viewport = document.getElementById('viewport');
        const container = document.getElementById('canvas-container');
        const nodesLayer = document.getElementById('nodes-layer');
        const svgLayer = document.getElementById('svg-layer');

        function init() {
            lucide.createIcons();
            render();
            setupPointerEvents();
            updateTransform();
        }

        function render() {
            nodesLayer.innerHTML = '';
            svgLayer.innerHTML = '';
            
            createNode(data, 0, 0, true);

            const clusterRadius = 350; // Constant for both mobile & laptop
            const issueRadius = 220;

            data.children.forEach((cluster, i) => {
                const angle = (i * 2 * Math.PI) / data.children.length;
                const cx = Math.cos(angle) * clusterRadius;
                const cy = Math.sin(angle) * clusterRadius;

                createNode(cluster, cx, cy, false, cluster.color);
                drawLink(0, 0, cx, cy, cluster.color);

                cluster.children.forEach((issue, j) => {
                    const subAngle = angle - 0.5 + (j * 0.5);
                    const ix = cx + Math.cos(subAngle) * issueRadius;
                    const iy = cy + Math.sin(subAngle) * issueRadius;

                    createNode(issue, ix, iy, false);
                    drawLink(cx, cy, ix, iy, cluster.color);
                });
            });
            lucide.createIcons();
        }

        function createNode(node, x, y, isRoot, color) {
            const div = document.createElement('div');
            div.className = 'node';
            div.style.left = `${x}px`;
            div.style.top = `${y}px`;
            div.style.transform = `translate(-50%, -50%)`;

            const card = document.createElement('div');
            card.className = 'node-card apple-glass';
            if(isRoot) card.style.borderColor = 'var(--accent)';
            
            card.innerHTML = `
                <div class="flex flex-col gap-2">
                    <div class="flex justify-between items-start">
                        <i data-lucide="${node.icon || 'circle'}" class="w-4 h-4" style="color:${color || '#fff'}"></i>
                        ${node.impact ? `<span class="text-[8px] font-black opacity-40">${node.impact}%</span>` : ''}
                    </div>
                    <p class="text-[11px] font-bold leading-tight">${node.label.replace('\n', ' ')}</p>
                    ${node.impact ? `<div class="impact-bar"><div class="impact-fill" style="width:${node.impact}%; background:${color}"></div></div>` : ''}
                </div>
            `;

            div.appendChild(card);
            div.onpointerdown = (e) => e.stopPropagation(); // Prevent panning when clicking node
            div.onclick = () => { if(!isDragging) openDrawer(node, color); };
            nodesLayer.appendChild(div);
        }

        function drawLink(x1, y1, x2, y2, color) {
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            // Offset coordinates to be relative to the 5000x5000 SVG center
            const ox = 2500, oy = 2500;
            const d = `M ${ox + x1} ${oy + y1} Q ${(ox+x1+ox+x2)/2} ${(oy+y1+oy+y2)/2}, ${ox + x2} ${oy + y2}`;
            path.setAttribute("d", d);
            path.setAttribute("class", "flow-line");
            path.setAttribute("stroke", color || "white");
            svgLayer.appendChild(path);
        }

        // --- UNIFIED POINTER EVENTS (MOUSE + TOUCH) ---
        function setupPointerEvents() {
            viewport.onpointerdown = (e) => {
                if(e.target.closest('.apple-glass')) return;
                isDragging = true;
                startX = e.clientX - posX;
                startY = e.clientY - posY;
                viewport.setPointerCapture(e.pointerId);
            };

            viewport.onpointermove = (e) => {
                if (!isDragging) return;
                posX = e.clientX - startX;
                posY = e.clientY - startY;
                updateTransform();
            };

            viewport.onpointerup = (e) => {
                isDragging = false;
                viewport.releasePointerCapture(e.pointerId);
            };

            // Zoom (Mouse Wheel)
            viewport.onwheel = (e) => {
                e.preventDefault();
                const delta = e.deltaY * -0.001;
                applyZoom(delta, e.clientX, e.clientY);
            };
        }

        function applyZoom(delta, cx = window.innerWidth/2, cy = window.innerHeight/2) {
            const oldScale = scale;
            scale = Math.min(Math.max(0.2, scale + delta), 3);
            const ratio = scale / oldScale;
            posX = cx - (cx - posX) * ratio;
            posY = cy - (cy - posY) * ratio;
            updateTransform();
        }

        function updateTransform() {
            // Offset the container so 0,0 is at the center of the viewport initially
            container.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        function openDrawer(node, color) {
            if(!node.causes && !node.solutions) return;
            const drawer = document.getElementById('detail-drawer');
            document.getElementById('drawer-title').innerText = node.label.replace('\n', ' ');
            document.getElementById('drawer-tag').style.color = color || 'var(--accent)';
            
            document.getElementById('drawer-content').innerHTML = `
                <div class="space-y-8">
                    ${node.stats ? `<div class="p-6 bg-white/5 rounded-3xl border border-white/10"><p class="text-[10px] font-black uppercase opacity-40 mb-2">Data Statistik</p><p class="text-2xl font-bold">${node.stats}</p></div>` : ''}
                    <div><p class="text-[10px] font-black uppercase opacity-40 mb-4">Akar Masalah</p>
                    <div class="space-y-3">${(node.causes || []).map(c => `<div class="flex gap-3 text-sm text-zinc-400"><i data-lucide="alert-circle" class="w-4 h-4 text-red-500 shrink-0"></i>${c}</div>`).join('')}</div></div>
                    <div><p class="text-[10px] font-black uppercase opacity-40 mb-4">Solusi Strategis</p>
                    <div class="space-y-4">${(node.solutions || []).map((s, i) => `<div class="flex gap-4 p-5 apple-glass rounded-2xl border-white/5"><span class="font-black text-blue-500">${i+1}</span><p class="text-sm font-medium">${s}</p></div>`).join('')}</div></div>
                </div>`;
            
            lucide.createIcons();
            drawer.classList.add('open');
        }

        function resetView() {
            scale = 0.8;
            posX = window.innerWidth / 2;
            posY = window.innerHeight / 2;
            updateTransform();
        }

        document.getElementById('close-drawer').onclick = () => document.getElementById('detail-drawer').classList.remove('open');
        document.getElementById('focus-btn').onclick = () => document.body.classList.toggle('focus-mode');

        window.onresize = () => resetView();
        init();
    </script>
</body>
</html>
