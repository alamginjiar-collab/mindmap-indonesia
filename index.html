<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indonesia Strategic Map - Mobile Optimized</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050506;
            --accent: #0A84FF;
            --glass: rgba(22, 22, 23, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
            touch-action: none; /* Mencegah scroll default browser */
        }

        .ambient-bg {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(10, 132, 255, 0.08) 0%, transparent 70%);
            z-index: -1;
        }

        .apple-glass {
            background: var(--glass);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--border);
        }

        #canvas-container {
            position: absolute;
            width: 100%; height: 100%;
            cursor: grab;
            transform-origin: 0 0;
            will-change: transform;
        }

        .node {
            position: absolute;
            transition: border-color 0.3s, box-shadow 0.3s;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .node-content {
            padding: 12px 16px;
            border-radius: 18px;
            text-align: center;
            min-width: 120px;
            font-size: 11px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .line-connector {
            fill: none;
            stroke-width: 1.5;
            opacity: 0.15;
        }

        /* Drawer Responsive */
        #detail-drawer {
            position: fixed;
            top: 0; right: 0; bottom: 0;
            width: 100%; /* Default Mobile */
            max-width: 500px; /* Desktop */
            transform: translateX(100%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
        }

        #detail-drawer.open { transform: translateX(0); }

        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }

        /* Search Bar Mobile */
        .search-container {
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            width: 90%; max-width: 500px;
            z-index: 500;
        }

        .focus-mode .ui-el { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>

    <!-- Search Bar -->
    <div class="search-container ui-el">
        <div class="apple-glass rounded-2xl p-2 flex items-center gap-3 shadow-2xl">
            <div class="pl-3 text-zinc-500"><i data-lucide="search" class="w-4 h-4"></i></div>
            <input type="text" id="search-input" placeholder="Cari isu (misal: Judol, Polusi)..." 
                   class="bg-transparent border-none outline-none w-full py-1 text-sm text-white">
            <button id="focus-btn" class="p-2 hover:bg-white/10 rounded-xl">
                <i data-lucide="maximize" class="w-4 h-4 text-zinc-400"></i>
            </button>
        </div>
    </div>

    <!-- Main Canvas -->
    <main id="viewport" class="relative w-full h-full overflow-hidden">
        <div id="canvas-container">
            <svg id="svg-layer" class="absolute inset-0 w-full h-full pointer-events-none"></svg>
            <div id="nodes-layer"></div>
        </div>
    </main>

    <!-- Mobile Controls -->
    <div class="ui-el fixed bottom-6 right-6 flex flex-col gap-3 z-50">
        <button onclick="resetMap()" class="apple-glass p-4 rounded-full shadow-xl active:scale-90 transition-all">
            <i data-lucide="refresh-cw" class="w-6 h-6"></i>
        </button>
    </div>

    <!-- Side Panel -->
    <aside id="detail-drawer" class="apple-glass flex flex-col">
        <div class="p-6 border-b border-white/10 flex justify-between items-center">
            <h2 id="drawer-title" class="text-xl font-bold">Detail Isu</h2>
            <button id="close-drawer" class="p-3 bg-white/5 rounded-full"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div id="drawer-content" class="flex-1 overflow-y-auto p-8 custom-scroll space-y-8">
            <!-- Content -->
        </div>
    </aside>

    <script>
        // --- DATA ---
        const mindData = {
            id: "root", label: "INDONESIA\n2024",
            children: [
                {
                    label: "Ekonomi Digital", color: "#0A84FF",
                    children: [
                        { label: "Judi Online", stats: "Rp 327 Triliun perputaran uang", causes: ["Akses pinjol mudah", "Literasi rendah"], solutions: ["Blokir IP", "Satgas Terpadu"] },
                        { label: "Pengangguran Gen Z", stats: "9,9 Juta NEET", causes: ["Mismatch skill", "Otomasi AI"], solutions: ["Link & Match SMK", "Insentif Pajak"] }
                    ]
                },
                {
                    label: "Lingkungan", color: "#30D158",
                    children: [
                        { label: "Polusi Jakarta", stats: "IQ terancam turun", causes: ["PLTU Batubara", "Kendaraan pribadi"], solutions: ["Bus Listrik", "Pajak Emisi"] },
                        { label: "Mafia Tanah", stats: "Konflik agraria masif", causes: ["Sertifikat manual", "Oknum birokrasi"], solutions: ["Sertifikat Digital", "Satgas Mafia"] }
                    ]
                },
                {
                    label: "Hukum & Etika", color: "#FF9F0A",
                    children: [
                        { label: "Dinasti Politik", stats: "IPK turun ke 34", causes: ["Biaya politik mahal", "Etika lemah"], solutions: ["UU Perampasan Aset", "Batasi Nepotisme"] },
                        { label: "Kebocoran Data", stats: "Data PDN diretas", causes: ["Server lemah", "SDM IT minim"], solutions: ["Audit Siber", "Sovereign Cloud"] }
                    ]
                }
            ]
        };

        // --- ENGINE STATE ---
        let scale = 0.8;
        let posX = window.innerWidth / 2;
        let posY = window.innerHeight / 2;
        let isDragging = false;
        let lastTouchX, lastTouchY;
        let initialPinchDist = null;

        const container = document.getElementById('canvas-container');
        const nodesLayer = document.getElementById('nodes-layer');
        const svgLayer = document.getElementById('svg-layer');

        function init() {
            lucide.createIcons();
            render();
            setupTouchEvents();
            updateTransform();
        }

        function render() {
            nodesLayer.innerHTML = '';
            svgLayer.innerHTML = '';
            
            // Root
            createNode(mindData, 0, 0, true);

            const clusterRadius = window.innerWidth < 600 ? 180 : 300;
            const issueRadius = window.innerWidth < 600 ? 120 : 200;

            mindData.children.forEach((cluster, i) => {
                const angle = (i * 2 * Math.PI) / mindData.children.length;
                const cx = Math.cos(angle) * clusterRadius;
                const cy = Math.sin(angle) * clusterRadius;

                createNode(cluster, cx, cy, false, cluster.color);
                drawLink(0, 0, cx, cy, cluster.color);

                cluster.children.forEach((issue, j) => {
                    const subAngle = angle - 0.4 + (j * 0.4);
                    const ix = cx + Math.cos(subAngle) * issueRadius;
                    const iy = cy + Math.sin(subAngle) * issueRadius;

                    createNode(issue, ix, iy, false);
                    drawLink(cx, cy, ix, iy, cluster.color);
                });
            });
        }

        function createNode(node, x, y, isRoot, color) {
            const div = document.createElement('div');
            div.className = 'node';
            div.style.left = `${x}px`;
            div.style.top = `${y}px`;

            const content = document.createElement('div');
            content.className = 'node-content apple-glass';
            if(isRoot) content.style.border = '2px solid var(--accent)';
            if(color) content.style.color = color;
            content.innerText = node.label;

            div.appendChild(content);
            div.onclick = () => { if(!isDragging) openDrawer(node); };
            nodesLayer.appendChild(div);
        }

        function drawLink(x1, y1, x2, y2, color) {
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", x1); line.setAttribute("y1", y1);
            line.setAttribute("x2", x2); line.setAttribute("y2", y2);
            line.setAttribute("class", "line-connector");
            line.setAttribute("stroke", color || "white");
            svgLayer.appendChild(line);
        }

        // --- TOUCH & GESTURE ENGINE ---
        function setupTouchEvents() {
            // Mouse Wheel (Desktop)
            window.addEventListener('wheel', e => {
                if(e.target.closest('#detail-drawer')) return;
                e.preventDefault();
                const delta = e.deltaY * -0.001;
                applyZoom(delta, e.clientX, e.clientY);
            }, { passive: false });

            // Touch Start
            window.addEventListener('touchstart', e => {
                if(e.target.closest('#detail-drawer') || e.target.closest('.ui-el')) return;
                isDragging = true;
                if(e.touches.length === 1) {
                    lastTouchX = e.touches[0].clientX;
                    lastTouchY = e.touches[0].clientY;
                } else if(e.touches.length === 2) {
                    initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                }
            }, { passive: false });

            // Touch Move
            window.addEventListener('touchmove', e => {
                if(e.target.closest('#detail-drawer')) return;
                e.preventDefault();

                if(e.touches.length === 1 && isDragging) {
                    const dx = e.touches[0].clientX - lastTouchX;
                    const dy = e.touches[0].clientY - lastTouchY;
                    posX += dx; posY += dy;
                    lastTouchX = e.touches[0].clientX;
                    lastTouchY = e.touches[0].clientY;
                } else if(e.touches.length === 2) {
                    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    const delta = (dist - initialPinchDist) * 0.005;
                    const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                    applyZoom(delta, midX, midY);
                    initialPinchDist = dist;
                }
                updateTransform();
            }, { passive: false });

            window.addEventListener('touchend', () => { isDragging = false; initialPinchDist = null; });
        }

        function applyZoom(delta, centerX, centerY) {
            const oldScale = scale;
            scale = Math.min(Math.max(0.3, scale + delta), 3);
            const ratio = scale / oldScale;
            posX = centerX - (centerX - posX) * ratio;
            posY = centerY - (centerY - posY) * ratio;
            updateTransform();
        }

        function updateTransform() {
            container.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        function openDrawer(node) {
            if(!node.causes && !node.solutions) return;
            const drawer = document.getElementById('detail-drawer');
            document.getElementById('drawer-title').innerText = node.label;
            
            let html = `
                <div class="space-y-6">
                    ${node.stats ? `<div class="p-4 bg-blue-500/10 rounded-2xl border border-blue-500/20"><p class="text-xs text-blue-400 font-bold uppercase mb-1">Statistik</p><p class="text-lg font-bold">${node.stats}</p></div>` : ''}
                    <div><p class="text-xs text-zinc-500 font-bold uppercase mb-3">Akar Masalah</p>
                    <ul class="space-y-2">${(node.causes || []).map(c => `<li class="flex gap-2 text-sm text-zinc-300"><i data-lucide="alert-circle" class="w-4 h-4 text-red-500 shrink-0"></i>${c}</li>`).join('')}</ul></div>
                    <div><p class="text-xs text-green-500 font-bold uppercase mb-3">Solusi Strategis</p>
                    <ul class="space-y-2">${(node.solutions || []).map(s => `<li class="flex gap-2 text-sm text-zinc-100 font-medium"><i data-lucide="check-circle" class="w-4 h-4 text-green-500 shrink-0"></i>${s}</li>`).join('')}</ul></div>
                </div>`;
            
            document.getElementById('drawer-content').innerHTML = html;
            lucide.createIcons();
            drawer.classList.add('open');
        }

        function resetMap() {
            scale = 0.8;
            posX = window.innerWidth / 2;
            posY = window.innerHeight / 2;
            updateTransform();
        }

        document.getElementById('close-drawer').onclick = () => document.getElementById('detail-drawer').classList.remove('open');
        document.getElementById('focus-btn').onclick = () => document.body.classList.toggle('focus-mode');

        window.addEventListener('resize', () => {
            resetMap();
            render();
        });

        init();
    </script>
</body>
</html>
