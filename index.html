<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indonesia Social Dashboard - High Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0c10;
            --card-bg: #1f2833;
            --accent: #45f3ff;
            --border: rgba(255, 255, 255, 0.08);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif; color: #c5c6c7;
            touch-action: none; -webkit-font-smoothing: antialiased;
        }

        /* Ambient static background - Ringan tanpa blur real-time */
        .ambient-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1f2833 0%, #0b0c10 100%);
        }

        /* Pengganti glassmorphism kaku biar performa HP lancar jaya */
        .premium-box {
            background: #151a22;
            border: 1px solid var(--border);
        }

        /* Canvas Navigation Layer dengan optimalisasi GPU */
        #viewport { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; position: relative; }
        #viewport:active { cursor: grabbing; }
        #canvas-container { 
            position: absolute; 
            transform-origin: 0 0; 
            will-change: transform;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        /* Node Cards - Ringan & Responsif */
        .node { position: absolute; pointer-events: auto; z-index: 10; }
        .node-card {
            width: 210px; padding: 14px; border-radius: 20px;
            background: #1b222c; border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }
        @media (max-width: 768px) {
            .node-card { width: 160px; padding: 10px; border-radius: 14px; }
        }
        .node-card:hover {
            transform: scale(1.05);
            border-color: var(--n-color, var(--accent));
        }
        .node-active {
            border-color: var(--n-color, var(--accent)) !important;
            background: #222a36 !important;
        }

        /* SVG Line Sederhana tapi Elegan (Anti-Lag) */
        .flow-line { fill: none; stroke-width: 2; opacity: 0.4; }

        /* Responsive Drawer System (Kanan di PC, Bottom Sheet di HP) */
        #detail-drawer {
            position: fixed; z-index: 1000;
            background: #12161f; border: 1px solid var(--border);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-col: column;
        }
        
        /* Layout untuk PC desktop */
        @media (min-width: 769px) {
            #detail-drawer { top: 16px; right: 16px; bottom: 16px; width: 460px; border-radius: 24px; transform: translateX(125%); }
        }
        /* Layout khusus HP agar pas di genggaman */
        @media (max-width: 768px) {
            #detail-drawer { left: 0; right: 0; bottom: 0; height: 70vh; border-radius: 24px 24px 0 0; transform: translateY(105%); }
        }
        #detail-drawer.open { transform: translateX(0) translateY(0); }

        .bar-bg { height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 4px; width: 0; transition: width 0.8s ease-out; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>

    <header class="fixed top-4 left-4 right-4 z-50 flex items-center justify-between pointer-events-none">
        <div class="flex items-center gap-3 pointer-events-auto premium-box p-2.5 rounded-xl shadow-lg">
            <div class="bg-cyan-500/10 p-2 rounded-lg"><i data-lucide="globe" class="text-cyan-400 w-5 h-5"></i></div>
            <div>
                <h1 class="text-xs md:text-sm font-extrabold tracking-tight text-white">INDONESIA SOCIAL HUB</h1>
                <p class="text-[8px] font-bold text-zinc-500 tracking-wider">Materi Isu Masalah Sosial Makro</p>
            </div>
        </div>
        <div class="pointer-events-auto premium-box px-3 py-1.5 rounded-full flex items-center gap-2 w-40 md:w-56 shadow-lg">
            <i data-lucide="search" class="w-3.5 h-3.5 text-zinc-400"></i>
            <input type="text" id="search-box" placeholder="Cari masalah..." class="bg-transparent text-[11px] text-white focus:outline-none w-full placeholder-zinc-500">
        </div>
    </header>

    <div id="viewport">
        <div id="canvas-container">
            <svg id="svg-layer" style="position:absolute; top:-3000px; left:-3000px; width:6000px; height:6000px; pointer-events:none;"></svg>
            <div id="nodes-layer"></div>
        </div>
    </div>

    <div class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 premium-box px-3 py-1.5 rounded-full flex items-center gap-2 shadow-xl">
        <button onclick="zoom(0.2)" class="p-1.5 hover:bg-white/5 active:scale-90 rounded-full text-white"><i data-lucide="plus" class="w-4 h-4"></i></button>
        <button onclick="zoom(-0.2)" class="p-1.5 hover:bg-white/5 active:scale-90 rounded-full text-white"><i data-lucide="minus" class="w-4 h-4"></i></button>
        <div class="w-px h-4 bg-white/10"></div>
        <button onclick="reset()" class="p-1.5 hover:bg-white/5 active:scale-90 rounded-full text-white"><i data-lucide="maximize" class="w-4 h-4"></i></button>
    </div>

    <aside id="detail-drawer">
        <div class="md:hidden w-12 h-1 bg-zinc-700 rounded-full mx-auto mt-3 shrink-0"></div>
        <div class="p-5 border-b border-white/5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div id="d-icon" class="p-2.5 rounded-xl"></div>
                <div>
                    <span class="text-[9px] font-bold text-zinc-400 tracking-wider uppercase">Analisis Isu Nasional</span>
                    <h2 id="d-title" class="text-base md:text-lg font-bold text-white tracking-tight">Judul Masalah</h2>
                </div>
            </div>
            <button id="close-d" class="p-2 hover:bg-white/5 text-zinc-400 hover:text-white rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div id="d-content" class="flex-1 overflow-y-auto p-5 space-y-6 custom-scroll">
            </div>
    </aside>

    <script>
        // --- DATABASE KOMPREHENSIF BERDASARKAN MATERI KAMU ---
        const masterData = {
            id: "pusat", label: "MASALAH SOSIAL\nINDONESIA", icon: "alert-octagon", color: "#ffffff",
            children: [
                {
                    id: "isu_miskin", label: "Kemiskinan & Kesenjangan", icon: "trending-down", color: "#ff453a",
                    desc: "Distribusi kekayaan yang tidak merata membuat sebagian masyarakat kesulitan memenuhi kebutuhan dasar, seperti pangan, pendidikan, dan kesehatan.",
                    fakta: "Ketimpangan Ekonomi Ekstrem", r_val: 88,
                    detail: [
                        {sub: "Akar Penyebab", isi: "Akses modal usaha terpusat, upah minimum belum mencukupi inflasi, serta minimnya jaringan pengaman sosial pedalaman."},
                        {sub: "Dampak Sistemik", isi: "Penurunan daya beli masyarakat kelas bawah, tingginya angka stunting, dan munculnya permukiman kumuh urban."},
                        {sub: "Solusi Taktis", isi: "Pemerataan program bantuan langsung bersasar, subsidi pendidikan vokasi, serta insentif usaha mikro daerah tertinggal."}
                    ]
                },
                {
                    id: "isu_kerja", label: "Pengangguran & Kerja", icon: "user-x", color: "#ff9f0a",
                    desc: "Ketidaksesuaian keterampilan (mismatch) antara lulusan baru (fresh graduate) dan kebutuhan industri memicu peningkatan angka pengangguran. Hal ini sering kali berdampak pada lonjakan angka kriminalitas.",
                    fakta: "Skill Gap & Lapangan Kerja", r_val: 82,
                    detail: [
                        {sub: "Akar Penyebab", isi: "Kurikulum institusi pendidikan tertinggal jauh dibanding laju otomatisasi industri modern dan perkembangan teknologi digital."},
                        {sub: "Dampak Sistemik", isi: "Ledakan kasus judi online, penipuan digital, serta kriminalitas jalanan akibat hilangnya opsi pendapatan legal."},
                        {sub: "Solusi Taktis", isi: "Kemitraan wajib antara sektor industri dengan SMK/Universitas, kartu prakerja adaptif, dan inkubasi bisnis kreatif madya."}
                    ]
                },
                {
                    id: "isu_edu", label: "Pendidikan Rendah", icon: "graduation-cap", color: "#bf5af2",
                    desc: "Kesenjangan fasilitas dan kualitas pengajaran antara kota besar dan daerah pelosok masih menjadi tantangan besar, yang berujung pada tingginya angka putus sekolah.",
                    fakta: "Ketimpangan Mutu Belajar", r_val: 75,
                    detail: [
                        {sub: "Akar Penyebab", isi: "Distribusi guru kompeten tidak merata, rusaknya infrastruktur sekolah daerah 3T, dan tingginya biaya penunjang edukasi."},
                        {sub: "Dampak Sistemik", isi: "Rendahnya daya saing angkatan kerja global dan terjebaknya siklus kemiskinan antar generasi (intergenerational poverty)."},
                        {sub: "Solusi Taktis", isi: "Digitalisasi bahan ajar nasional, tunjangan khusus berlipat ganda untuk guru pelosok, dan perluasan jangkauan beasiswa penuh."}
                    ]
                },
                {
                    id: "isu_lingkungan", label: "Kerusakan Lingkungan", icon: "leaf", color: "#30d158",
                    desc: "Masalah seperti kebakaran hutan, polusi udara di kota-kota besar, dan pengelolaan sampah yang buruk menimbulkan ancaman serius terhadap ekosistem dan kesehatan publik.",
                    fakta: "Krisis Ekologis Makro", r_val: 85,
                    detail: [
                        {sub: "Akar Penyebab", isi: "Eksploitasi lahan berlebih tanpa sanksi tegas, buruknya manajemen limbah industri korporasi, serta kultur minim daur ulang."},
                        {sub: "Dampak Sistemik", isi: "Lonjakan penderita penyakit ISPA, krisis air bersih perkotaan, dan kerugian finansial akibat bencana tahunan."},
                        {sub: "Solusi Taktis", isi: "Pemberlakuan pajak karbon ketat, modernisasi tempat pembuangan akhir (TPA) sanitasi, dan penegakan hukum bagi pelaku deforestasi."}
                    ]
                },
                {
                    id: "isu_korupsi", label: "Tindak Pidana Korupsi", icon: "gavel", color: "#ff375f",
                    desc: "Masalah ini masih menjadi salah satu tantangan terbesar penegakan hukum di Indonesia, yang menghambat pembangunan dan merugikan keuangan negara.",
                    fakta: "Kebocoran Anggaran Negara", r_val: 94,
                    detail: [
                        {sub: "Akar Penyebab", isi: "Sistem pendanaan politik lokal yang mahal, ringannya sanksi vonis hukum bagi koruptor, serta lemahnya transparansi birokrasi pengadaan."},
                        {sub: "Dampak Sistemik", isi: "Pembangunan infrastruktur publik menjadi terbengkalai, kualitas pelayanan publik menurun, dan hilangnya kepercayaan investor asing."},
                        {sub: "Solusi Taktis", isi: "Implementasi penuh sistem e-budgeting transparan, pengesahan RUU Perampasan Aset, dan penguatan lembaga pengawas independen."}
                    ]
                },
                {
                    id: "isu_penduduk", label: "Masalah Kependudukan", icon: "users", color: "#54e3ff",
                    desc: "Pertumbuhan penduduk yang tidak merata dan tingginya urbanisasi menciptakan masalah baru, seperti pemukiman kumuh, kemacetan, dan layanan publik yang tidak memadai.",
                    fakta: "Ledakan Urbanisasi Tak Terkendali", r_val: 79,
                    detail: [
                        {sub: "Akar Penyebab", isi: "Sentralisasi pembangunan ekonomi yang terlalu berfokus di pulau Jawa / kota metropolitan, mengabaikan potensi desa."},
                        {sub: "Dampak Sistemik", isi: "Kemacetan lalu lintas parah, penumpukan wilayah kumuh padat hunian, dan tidak seimbangnya beban layanan rumah sakit/fasilitas publik."},
                        {sub: "Solusi Taktis", isi: "Desentralisasi industri manufaktur ke luar daerah, pembangunan kawasan satelit mandiri, dan optimalisasi program dana desa produktif."}
                    ]
                }
            ]
        };

        // --- CORE NAVIGATION ENGINE (OPTIMAL & RINGAN) ---
        let scale = window.innerWidth < 768 ? 0.45 : 0.8; 
        let posX = window.innerWidth / (window.innerWidth < 768 ? 2 : 2.5);
        let posY = window.innerHeight / 2;
        let isDragging = false, startX, startY;

        const container = document.getElementById('canvas-container');
        const nodesLayer = document.getElementById('nodes-layer');
        const svgLayer = document.getElementById('svg-layer');

        function init() {
            renderGraph();
            setupEvents();
            updateTransform();
            setupSearch();
            lucide.createIcons();
        }

        function renderGraph() {
            nodesLayer.innerHTML = ''; svgLayer.innerHTML = '';
            
            // Render Pusat Map
            createNode(masterData, 0, 0, true);

            // Pengaturan sebaran posisi lingkaran/hub agar rapi di desktop & HP
            const isMobile = window.innerWidth < 768;
            const radius = isMobile ? 320 : 450;
            const total = masterData.children.length;

            masterData.children.forEach((child, i) => {
                const angle = (i * 2 * Math.PI) / total;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;

                // Garis SVG ringan lurus linear
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", 3000); line.setAttribute("y1", 3000);
                line.setAttribute("x2", 3000 + x); line.setAttribute("y2", 3000 + y);
                line.setAttribute("class", "flow-line");
                line.setAttribute("stroke", child.color);
                svgLayer.appendChild(line);

                createNode(child, x, y, false);
            });
        }

        function createNode(node, x, y, isRoot) {
            const div = document.createElement('div');
            div.className = 'node';
            div.style.left = `${x}px`; div.style.top = `${y}px`;
            div.style.transform = `translate(-50%, -50%)`;
            div.id = `n-${node.id}`;
            div.setAttribute('data-text', (node.label + " " + node.desc).toLowerCase());

            const card = document.createElement('div');
            card.className = `node-card ${isRoot ? 'border-zinc-500 bg-zinc-900/90 text-center' : ''}`;
            card.style.setProperty('--n-color', node.color);

            card.innerHTML = `
                <div class="flex flex-col ${isRoot ? 'items-center' : ''} gap-2">
                    <div class="flex justify-between items-center w-full">
                        <div class="p-1 bg-white/5 rounded-md"><i data-lucide="${node.icon}" style="color:${node.color}" class="w-4 h-4"></i></div>
                        ${node.r_val ? `<span class="text-[9px] font-bold px-1.5 py-0.5 rounded bg-white/5" style="color:${node.color}">${node.r_val}%</span>` : ''}
                    </div>
                    <p class="text-[11px] md:text-[13px] font-bold leading-tight text-white">${node.label.replace('\n', ' ')}</p>
                </div>
            `;

            div.appendChild(card);
            div.onpointerdown = (e) => e.stopPropagation();
            div.onclick = () => { if(!isDragging) openDrawer(node); };
            nodesLayer.appendChild(div);
        }

        function openDrawer(node) {
            if(node.id === "pusat") return;
            
            document.querySelectorAll('.node-card').forEach(c => c.classList.remove('node-active'));
            document.querySelector(`#n-${node.id} .node-card`).classList.add('node-active');

            const drawer = document.getElementById('detail-drawer');
            document.getElementById('d-title').innerText = node.label;
            
            const iBox = document.getElementById('d-icon');
            iBox.style.backgroundColor = `${node.color}15`;
            iBox.innerHTML = `<i data-lucide="${node.icon}" style="color:${node.color}" class="w-5 h-5"></i>`;

            let html = `
                <p class="text-xs md:text-sm leading-relaxed text-zinc-300 bg-white/[0.02] p-4 rounded-xl border border-white/5">${node.desc}</p>
                
                <div class="space-y-2">
                    <div class="flex justify-between text-xs font-bold text-zinc-400"><span>Tingkat Keparahan Krisis</span><span>${node.r_val}%</span></div>
                    <div class="bar-bg"><div class="bar-fill" style="background:${node.color}" data-w="${node.r_val}%"></div></div>
                </div>

                <div class="space-y-3.5">
                    ${node.detail.map(d => `
                        <div class="p-4 bg-white/[0.01] border border-white/[0.03] rounded-xl space-y-1">
                            <h4 class="text-[11px] font-extrabold uppercase tracking-wider" style="color:${node.color}">${d.sub}</h4>
                            <p class="text-xs text-zinc-400 leading-relaxed">${d.isi}</p>
                        </div>
                    `).join('')}
                </div>
            `;

            document.getElementById('d-content').innerHTML = html;
            drawer.classList.add('open');
            lucide.createIcons();

            setTimeout(() => {
                const fill = document.querySelector('.bar-fill');
                if(fill) fill.style.width = fill.getAttribute('data-w');
            }, 50);
        }

        // --- SISTEM DRAG & ZOOM PERFORMA TINGGI ---
        function setupEvents() {
            viewport.onpointerdown = (e) => {
                if(e.target.closest('header, aside, button, input')) return;
                isDragging = true;
                startX = e.clientX - posX; startY = e.clientY - posY;
                viewport.setPointerCapture(e.pointerId);
            };
            viewport.onpointermove = (e) => {
                if (!isDragging) return;
                posX = e.clientX - startX; posY = e.clientY - startY;
                updateTransform();
            };
            viewport.onpointerup = (e) => { isDragging = false; viewport.releasePointerCapture(e.pointerId); };
            viewport.onwheel = (e) => { e.preventDefault(); zoom(e.deltaY * -0.001); };
        }

        function zoom(delta) {
            const old = scale;
            scale = Math.min(Math.max(window.innerWidth < 768 ? 0.25 : 0.4, scale + delta), 2);
            const ratio = scale / old;
            posX = window.innerWidth/2 - (window.innerWidth/2 - posX) * ratio;
            posY = window.innerHeight/2 - (window.innerHeight/2 - posY) * ratio;
            updateTransform();
        }

        function updateTransform() {
            // Memanfaatkan translate3d agar browser merender langsung via Hardware GPU Acceleration
            container.style.transform = `translate3d(${posX}px, ${posY}px, 0) scale(${scale})`;
        }

        function reset() {
            scale = window.innerWidth < 768 ? 0.45 : 0.8;
            posX = window.innerWidth / (window.innerWidth < 768 ? 2 : 2.5);
            posY = window.innerHeight / 2;
            updateTransform();
        }

        function setupSearch() {
            document.getElementById('search-box').oninput = (e) => {
                const q = e.target.value.toLowerCase().trim();
                document.querySelectorAll('.node').forEach(n => {
                    const txt = n.getAttribute('data-text');
                    n.style.opacity = (q === '' || txt.includes(q)) ? '1' : '0.15';
                });
            };
        }

        document.getElementById('close-d').onclick = () => document.getElementById('detail-drawer').classList.remove('open');
        window.onresize = () => reset();

        init();
    </script>
</body>
</html>
