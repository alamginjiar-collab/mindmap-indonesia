<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indonesia Social Infographic - Data Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050507;
            --accent: #0A84FF;
            --glass: rgba(18, 18, 22, 0.9);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif; color: white;
            touch-action: none;
        }

        /* --- Apple Aesthetic Background --- */
        .ambient-glow {
            position: fixed; inset: 0; z-index: -1;
            background: 
                radial-gradient(circle at 15% 15%, rgba(10, 132, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(48, 209, 88, 0.1) 0%, transparent 40%);
        }

        .apple-glass {
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--border);
        }

        /* --- Interactive Canvas --- */
        #viewport { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; position: relative; }
        #viewport:active { cursor: grabbing; }
        #canvas-container { position: absolute; transform-origin: 0 0; will-change: transform; pointer-events: none; }

        .node { position: absolute; pointer-events: auto; }
        .node-card {
            width: 200px; padding: 20px; border-radius: 28px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .node-card:hover { transform: scale(1.05) translateY(-5px); border-color: var(--accent); }

        /* --- Infographic Components in Drawer --- */
        .donut-chart {
            width: 120px; height: 120px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .donut-inner {
            width: 90px; height: 90px;
            background: #121216;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        .comparison-bar {
            height: 12px; background: rgba(255,255,255,0.05);
            border-radius: 6px; overflow: hidden;
        }
        .bar-fill { height: 100%; transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* --- Drawer Animation --- */
        #detail-drawer {
            position: fixed; top: 10px; right: 10px; bottom: 10px;
            width: calc(100% - 20px); max-width: 550px;
            transform: translateX(110%); transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000; border-radius: 35px;
        }
        #detail-drawer.open { transform: translateX(0); }

        .flow-line { fill: none; stroke-width: 1.5; stroke-dasharray: 10, 15; animation: flow 25s linear infinite; opacity: 0.2; }
        @keyframes flow { from { stroke-dashoffset: 500; } to { stroke-dashoffset: 0; } }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <!-- UI Header -->
    <header class="fixed top-8 left-8 z-50 flex items-center gap-4">
        <div class="apple-glass p-3 rounded-2xl">
            <i data-lucide="bar-chart-3" class="text-blue-500 w-6 h-6"></i>
        </div>
        <div>
            <h1 class="text-lg font-black tracking-tighter">INDONESIA INFOGRAPHIC</h1>
            <p class="text-[9px] font-bold text-zinc-500 tracking-[0.3em] uppercase">Data-Driven Social Analysis</p>
        </div>
    </header>

    <!-- Canvas -->
    <div id="viewport">
        <div id="canvas-container">
            <svg id="svg-layer" style="position:absolute; top:-2500px; left:-2500px; width:5000px; height:5000px; pointer-events:none;"></svg>
            <div id="nodes-layer"></div>
        </div>
    </div>

    <!-- Controls -->
    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-3 z-50">
        <div class="apple-glass p-2 rounded-[2rem] flex items-center gap-2 shadow-2xl">
            <button onclick="applyZoom(0.2)" class="p-3 hover:bg-white/10 rounded-full transition-all"><i data-lucide="plus" class="w-5 h-5"></i></button>
            <button onclick="applyZoom(-0.2)" class="p-3 hover:bg-white/10 rounded-full transition-all"><i data-lucide="minus" class="w-5 h-5"></i></button>
            <div class="w-px h-6 bg-white/10 mx-1"></div>
            <button onclick="resetView()" class="p-3 hover:bg-white/10 rounded-full transition-all"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
        </div>
    </div>

    <!-- Infographic Drawer -->
    <aside id="detail-drawer" class="apple-glass flex flex-col overflow-hidden">
        <div class="p-8 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
            <div>
                <span id="drawer-tag" class="text-[10px] font-black tracking-widest text-blue-500 uppercase">Data Report</span>
                <h2 id="drawer-title" class="text-2xl font-bold mt-1">Judul Isu</h2>
            </div>
            <button id="close-drawer" class="p-4 hover:bg-white/10 rounded-full"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div id="drawer-content" class="flex-1 overflow-y-auto p-8 space-y-12">
            <!-- Infographic content will be injected here -->
        </div>
    </aside>

    <script>
        // --- DATA WITH INFOGRAPHIC SPECS ---
        const data = {
            id: "root", label: "INDONESIA\nSOCIAL HUB",
            children: [
                {
                    label: "Ekonomi Digital", color: "#0A84FF", icon: "zap",
                    children: [
                        { 
                            label: "Judi Online", impact: 95, color: "#FF453A",
                            stats: "Rp 327 Triliun",
                            comparison: { label: "Kerugian vs Anggaran Kesehatan", val1: 95, val2: 40 },
                            demographics: [ {label: "Remaja", val: "25%"}, {label: "Dewasa", val: "60%"}, {label: "Lansia", val: "15%"} ],
                            solutions: ["Blokir IP Bandar", "Edukasi Finansial", "Satgas Lintas Negara"]
                        },
                        { 
                            label: "Gen Z NEET", impact: 82, color: "#BF5AF2",
                            stats: "9.9 Juta Jiwa",
                            comparison: { label: "Lulusan vs Lapangan Kerja", val1: 82, val2: 30 },
                            solutions: ["Revitalisasi SMK", "Insentif Startup", "Digital Nomad Visa"]
                        }
                    ]
                },
                {
                    label: "Lingkungan", color: "#30D158", icon: "leaf",
                    children: [
                        { 
                            label: "Polusi Udara", impact: 88, color: "#FF9F0A",
                            stats: "AQI 160+",
                            comparison: { label: "Jakarta vs Standar WHO", val1: 90, val2: 15 },
                            solutions: ["Konversi Bus Listrik", "Pajak Karbon", "RTH Masif"]
                        }
                    ]
                }
            ]
        };

        // --- ENGINE ---
        let scale = 0.8, posX = window.innerWidth / 2, posY = window.innerHeight / 2;
        let isDragging = false, startX, startY;

        const viewport = document.getElementById('viewport');
        const container = document.getElementById('canvas-container');
        const nodesLayer = document.getElementById('nodes-layer');
        const svgLayer = document.getElementById('svg-layer');

        function init() {
            lucide.createIcons();
            render();
            setupEvents();
            updateTransform();
        }

        function render() {
            nodesLayer.innerHTML = ''; svgLayer.innerHTML = '';
            createNode(data, 0, 0, true);
            const clusterRadius = 350, issueRadius = 220;

            data.children.forEach((cluster, i) => {
                const angle = (i * 2 * Math.PI) / data.children.length;
                const cx = Math.cos(angle) * clusterRadius, cy = Math.sin(angle) * clusterRadius;
                createNode(cluster, cx, cy, false, cluster.color);
                drawLink(0, 0, cx, cy, cluster.color);

                cluster.children.forEach((issue, j) => {
                    const subAngle = angle - 0.4 + (j * 0.4);
                    const ix = cx + Math.cos(subAngle) * issueRadius, iy = cy + Math.sin(subAngle) * issueRadius;
                    createNode(issue, ix, iy, false);
                    drawLink(cx, cy, ix, iy, cluster.color);
                });
            });
            lucide.createIcons();
        }

        function createNode(node, x, y, isRoot, color) {
            const div = document.createElement('div');
            div.className = 'node';
            div.style.left = `${x}px`; div.style.top = `${y}px`;
            div.style.transform = `translate(-50%, -50%)`;

            const card = document.createElement('div');
            card.className = 'node-card apple-glass';
            if(isRoot) card.style.borderColor = 'var(--accent)';
            
            card.innerHTML = `
                <div class="flex flex-col gap-3">
                    <div class="flex justify-between items-center">
                        <i data-lucide="${node.icon || 'circle'}" class="w-4 h-4" style="color:${color || '#fff'}"></i>
                        <span class="text-[8px] font-black opacity-40 uppercase tracking-tighter">${node.impact ? node.impact + '% Impact' : ''}</span>
                    </div>
                    <p class="text-[11px] font-bold leading-tight">${node.label.replace('\n', ' ')}</p>
                </div>`;

            div.appendChild(card);
            div.onpointerdown = (e) => e.stopPropagation();
            div.onclick = () => { if(!isDragging) openInfographic(node, color); };
            nodesLayer.appendChild(div);
        }

        function drawLink(x1, y1, x2, y2, color) {
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const ox = 2500, oy = 2500;
            const d = `M ${ox + x1} ${oy + y1} Q ${(ox+x1+ox+x2)/2} ${(oy+y1+oy+y2)/2}, ${ox + x2} ${oy + y2}`;
            path.setAttribute("d", d);
            path.setAttribute("class", "flow-line");
            path.setAttribute("stroke", color || "white");
            svgLayer.appendChild(path);
        }

        function openInfographic(node, color) {
            if(!node.impact) return;
            const drawer = document.getElementById('detail-drawer');
            document.getElementById('drawer-title').innerText = node.label;
            
            let html = `
                <!-- Section 1: Hero Stats -->
                <div class="flex items-center justify-between gap-6">
                    <div class="donut-chart" style="background: conic-gradient(${color || 'var(--accent)'} ${node.impact * 3.6}deg, rgba(255,255,255,0.05) 0deg)">
                        <div class="donut-inner text-xl font-black">${node.impact}%</div>
                    </div>
                    <div class="flex-1">
                        <p class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1">Total Kerugian/Dampak</p>
                        <p class="text-3xl font-black" style="color:${color}">${node.stats}</p>
                    </div>
                </div>

                <!-- Section 2: Comparison Bar -->
                ${node.comparison ? `
                <div class="space-y-4">
                    <h4 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">${node.comparison.label}</h4>
                    <div class="space-y-3">
                        <div>
                            <div class="flex justify-between text-[10px] mb-1 font-bold"><span>Isu Saat Ini</span><span>${node.comparison.val1}%</span></div>
                            <div class="comparison-bar"><div class="bar-fill" style="width:${node.comparison.val1}%; background:${color}"></div></div>
                        </div>
                        <div>
                            <div class="flex justify-between text-[10px] mb-1 font-bold"><span>Standar/Target</span><span>${node.comparison.val2}%</span></div>
                            <div class="comparison-bar"><div class="bar-fill" style="width:${node.comparison.val2}%; background:rgba(255,255,255,0.2)"></div></div>
                        </div>
                    </div>
                </div>` : ''}

                <!-- Section 3: Demographic Grid -->
                ${node.demographics ? `
                <div class="grid grid-cols-3 gap-4">
                    ${node.demographics.map(d => `
                        <div class="p-4 bg-white/5 rounded-2xl text-center border border-white/5">
                            <p class="text-[10px] font-bold text-zinc-500 mb-1">${d.label}</p>
                            <p class="text-lg font-black">${d.val}</p>
                        </div>
                    `).join('')}
                </div>` : ''}

                <!-- Section 4: Solution Timeline -->
                <div class="space-y-6">
                    <h4 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Roadmap Solusi Strategis</h4>
                    <div class="space-y-4 border-l-2 border-white/5 ml-2 pl-6">
                        ${(node.solutions || []).map((s, i) => `
                            <div class="relative">
                                <div class="absolute -left-[33px] top-1 w-4 h-4 rounded-full border-4 border-[#121216]" style="background:${color}"></div>
                                <p class="text-sm font-bold text-zinc-200">${s}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            document.getElementById('drawer-content').innerHTML = html;
            drawer.classList.add('open');
        }

        // --- INTERACTION ENGINE ---
        function setupEvents() {
            viewport.onpointerdown = (e) => {
                if(e.target.closest('.apple-glass')) return;
                isDragging = true; startX = e.clientX - posX; startY = e.clientY - posY;
                viewport.setPointerCapture(e.pointerId);
            };
            viewport.onpointermove = (e) => {
                if (!isDragging) return;
                posX = e.clientX - startX; posY = e.clientY - startY;
                updateTransform();
            };
            viewport.onpointerup = (e) => { isDragging = false; viewport.releasePointerCapture(e.pointerId); };
            viewport.onwheel = (e) => { e.preventDefault(); applyZoom(e.deltaY * -0.001, e.clientX, e.clientY); };
        }

        function applyZoom(delta, cx = window.innerWidth/2, cy = window.innerHeight/2) {
            const oldScale = scale;
            scale = Math.min(Math.max(0.2, scale + delta), 3);
            const ratio = scale / oldScale;
            posX = cx - (cx - posX) * ratio; posY = cy - (cy - posY) * ratio;
            updateTransform();
        }

        function updateTransform() { container.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }
        function resetView() { scale = 0.8; posX = window.innerWidth / 2; posY = window.innerHeight / 2; updateTransform(); }

        document.getElementById('close-drawer').onclick = () => document.getElementById('detail-drawer').classList.remove('open');
        window.onresize = () => resetView();
        init();
    </script>
</body>
</html>
