<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Masalah Sosial Indonesia - Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c0c0e;
            --card-bg: rgba(24, 24, 27, 0.7);
            --accent-blue: #0A84FF;
            --accent-green: #30D158;
            --accent-red: #FF453A;
            --accent-purple: #BF5AF2;
            --accent-orange: #FF9F0A;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: #f5f5f7;
            overflow: hidden;
            height: 100vh;
        }

        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        #canvas-container {
            cursor: grab;
            transition: transform 0.1s cubic-bezier(0.2, 0, 0.2, 1);
            transform-origin: center;
        }

        .node {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            user-select: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .node:hover {
            transform: scale(1.08) translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
            z-index: 50;
        }

        .line-connector {
            fill: none;
            stroke: rgba(255, 255, 255, 0.06);
            stroke-width: 1.5;
            transition: stroke 0.5s;
        }

        #detail-drawer {
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateX(100%);
        }

        #detail-drawer.open {
            transform: translateX(0);
        }

        .search-highlight {
            box-shadow: 0 0 0 4px var(--accent-blue);
            border-color: var(--accent-blue) !important;
        }

        .focus-mode .ui-element {
            opacity: 0;
            pointer-events: none;
        }

        /* Scrollbar Styling */
        #drawer-content-scroll::-webkit-scrollbar { width: 4px; }
        #drawer-content-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .cluster-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <!-- Top UI -->
    <header class="ui-element fixed top-6 left-1/2 -translate-x-1/2 z-50 w-full max-w-2xl px-4 transition-all duration-500">
        <div class="glass rounded-3xl p-2 flex items-center gap-3 shadow-2xl">
            <div class="pl-4 text-zinc-500"><i data-lucide="search" class="w-4 h-4"></i></div>
            <input type="text" id="search-input" placeholder="Cari masalah, rumpun, atau solusi..." 
                   class="bg-transparent border-none outline-none w-full py-2 text-sm text-zinc-200 placeholder:text-zinc-600">
            <button id="focus-toggle" class="p-2 hover:bg-white/10 rounded-2xl transition-colors mr-1">
                <i data-lucide="maximize-2" class="w-4 h-4 text-zinc-400"></i>
            </button>
        </div>
    </header>

    <!-- Canvas -->
    <main class="relative w-full h-full overflow-hidden">
        <div id="canvas-container" class="absolute inset-0 flex items-center justify-center">
            <svg id="svg-connections" class="absolute inset-0 w-full h-full pointer-events-none"></svg>
            <div id="nodes-layer" class="relative"></div>
        </div>
    </main>

    <!-- Bottom Controls -->
    <div class="ui-element fixed bottom-10 left-10 z-50 flex flex-col gap-3 transition-all duration-500">
        <button onclick="adjustZoom(0.15)" class="glass p-4 rounded-2xl hover:bg-white/10 active:scale-90 transition-all"><i data-lucide="plus" class="w-5 h-5"></i></button>
        <button onclick="adjustZoom(-0.15)" class="glass p-4 rounded-2xl hover:bg-white/10 active:scale-90 transition-all"><i data-lucide="minus" class="w-5 h-5"></i></button>
        <button onclick="resetView()" class="glass p-4 rounded-2xl hover:bg-white/10 active:scale-90 transition-all"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
    </div>

    <!-- Detail Drawer -->
    <aside id="detail-drawer" class="fixed top-0 right-0 h-full w-full max-w-lg glass z-[60] shadow-2xl border-l border-white/5 flex flex-col">
        <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
            <div id="drawer-badge" class="px-3 py-1 rounded-full text-[10px] font-bold tracking-widest">DETAIL ANALISIS</div>
            <button id="close-drawer" class="p-2 hover:bg-white/10 rounded-full transition-all">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
        
        <div id="drawer-content-scroll" class="flex-1 overflow-y-auto p-10">
            <div id="drawer-content">
                <!-- Content injected by JS -->
            </div>
        </div>
    </aside>

    <script>
        const mindMapData = {
            id: "root",
            label: "MASALAH SOSIAL\nINDONESIA",
            type: "root",
            children: [
                {
                    id: "rumpun-ekonomi",
                    label: "Ekonomi & \nKetenagakerjaan",
                    type: "cluster",
                    color: "var(--accent-blue)",
                    children: [
                        {
                            id: "kemiskinan",
                            label: "Kemiskinan",
                            type: "issue",
                            description: "Ketidakmampuan memenuhi standar hidup layak secara berkelanjutan.",
                            causes: ["Akses pendidikan rendah", "Distribusi kekayaan tidak merata"],
                            impact: ["Stunting", "Kriminalitas", "Putus sekolah"],
                            solutions: ["Pemberdayaan UMKM Digital", "Reforma Agraria", "Bansos Berbasis AI"]
                        },
                        {
                            id: "komersialisasi-pendidikan",
                            label: "Komersialisasi\nPendidikan",
                            type: "issue",
                            description: "Pendidikan berkualitas berubah menjadi barang mewah yang sulit diakses kelas pekerja.",
                            causes: ["Perubahan status PTN-BH", "Pengurangan subsidi negara", "Biaya jalur mandiri yang meroket"],
                            impact: ["Stratifikasi sosial", "Hambatan mobilitas vertikal", "Hanya elit yang menguasai posisi strategis"],
                            solutions: ["Dana Abadi Pendidikan (Endowment Fund)", "Audit Biaya Operasional Kampus", "Beasiswa Berbasis Pendapatan Riil"]
                        }
                    ]
                },
                {
                    id: "rumpun-lingkungan",
                    label: "Lingkungan & \nTata Kota",
                    type: "cluster",
                    color: "var(--accent-green)",
                    children: [
                        {
                            id: "krisis-ekologis",
                            label: "Krisis Ekologis &\nPangan",
                            type: "issue",
                            description: "Ancaman terhadap ketersediaan pangan akibat kerusakan alam dan alih fungsi lahan.",
                            causes: ["Alih fungsi lahan pertanian", "Pencemaran pestisida", "Perubahan iklim global"],
                            impact: ["Ketergantungan impor pangan", "Harga sembako mahal", "Gagal panen massal"],
                            solutions: ["Regenerative Agriculture", "Urban Farming Masif", "Proteksi Lahan Abadi"]
                        },
                        {
                            id: "sampah",
                            label: "Manajemen Sampah",
                            type: "issue",
                            description: "Kegagalan sistem pengelolaan limbah domestik dan industri.",
                            causes: ["Budaya sekali pakai", "Infrastruktur TPA overload"],
                            impact: ["Pencemaran mikroplastik", "Banjir tahunan"],
                            solutions: ["Ekonomi Sirkular", "Pajak Plastik Produsen", "Waste-to-Energy"]
                        }
                    ]
                },
                {
                    id: "rumpun-psikologis",
                    label: "Psikologis & \nBudaya",
                    type: "cluster",
                    color: "var(--accent-purple)",
                    children: [
                        {
                            id: "mental-health",
                            label: "Darurat Kesehatan\nMental",
                            type: "issue",
                            description: "Lonjakan gangguan kecemasan dan depresi di kalangan generasi produktif.",
                            causes: ["Hustle culture", "Cyberbullying", "Minimnya fasilitas psikolog BPJS"],
                            impact: ["Penurunan produktivitas", "Angka bunuh diri meningkat", "Renggangnya hubungan keluarga"],
                            solutions: ["Integrasi Mental Health di Sekolah/Kantor", "Telemedis Psikologi Gratis", "Kampanye Anti-Stigma"]
                        },
                        {
                            id: "polarisasi",
                            label: "Polarisasi & \nKrisis Toleransi",
                            type: "issue",
                            description: "Masyarakat terpecah menjadi kubu-kubu ekstrem akibat politik identitas.",
                            causes: ["Algoritma Filter Bubble", "Hoaks masif", "Kurangnya literasi digital"],
                            impact: ["Konflik fisik", "Energi bangsa habis berdebat", "Melemahnya persatuan"],
                            solutions: ["Kurikulum Berpikir Kritis", "Moderasi Konten Berbasis AI", "Dialog Lintas Iman Digital"]
                        }
                    ]
                },
                {
                    id: "rumpun-hukum",
                    label: "Hukum & \nTata Kelola",
                    type: "cluster",
                    color: "var(--accent-orange)",
                    children: [
                        {
                            id: "korupsi",
                            label: "Korupsi Sistemik",
                            type: "issue",
                            description: "Penyalahgunaan wewenang yang menghambat pembangunan nasional.",
                            causes: ["Biaya politik tinggi", "Pengawasan lemah"],
                            impact: ["Kualitas infrastruktur buruk", "Ketidakadilan hukum"],
                            solutions: ["E-Government Transparan", "Pendidikan Antikorupsi", "Perampasan Aset Koruptor"]
                        },
                        {
                            id: "digital-divide",
                            label: "Ketimpangan\nDigital",
                            type: "issue",
                            description: "Jurang akses teknologi antara kota besar dengan daerah 3T.",
                            causes: ["Infrastruktur kabel belum merata", "Harga perangkat mahal bagi warga miskin"],
                            impact: ["Anak pelosok sulit bersaing", "Lingkaran kemiskinan antar-generasi"],
                            solutions: ["Satelit SATRIA-1", "Subsidi Perangkat Belajar", "Internet Desa Gratis"]
                        }
                    ]
                }
            ]
        };

        let zoom = 0.9;
        let offset = { x: 0, y: 0 };
        let isDragging = false;
        let startPan = { x: 0, y: 0 };

        const container = document.getElementById('canvas-container');
        const nodesLayer = document.getElementById('nodes-layer');
        const svg = document.getElementById('svg-connections');
        const drawer = document.getElementById('detail-drawer');

        function init() {
            lucide.createIcons();
            render();
            setupEvents();
            updateTransform();
        }

        function render() {
            nodesLayer.innerHTML = '';
            svg.innerHTML = '';
            
            // Root Node
            createNode(mindMapData, 0, 0);

            const clusterRadius = 320;
            const issueRadius = 220;
            const clusterAngleStep = (Math.PI * 2) / mindMapData.children.length;

            mindMapData.children.forEach((cluster, i) => {
                const angle = clusterAngleStep * i;
                const cx = Math.cos(angle) * clusterRadius;
                const cy = Math.sin(angle) * clusterRadius;
                
                createNode(cluster, cx, cy);
                drawPath(0, 0, cx, cy, 'rgba(255,255,255,0.1)');

                cluster.children.forEach((issue, j) => {
                    const subAngle = angle - 0.4 + (j * 0.8);
                    const ix = cx + Math.cos(subAngle) * issueRadius;
                    const iy = cy + Math.sin(subAngle) * issueRadius;
                    
                    createNode(issue, ix, iy);
                    drawPath(cx, cy, ix, iy, cluster.color);
                });
            });
        }

        function createNode(data, x, y) {
            const div = document.createElement('div');
            div.className = `node absolute glass px-6 py-4 rounded-2xl cursor-pointer text-center min-w-[160px] flex flex-col items-center justify-center`;
            
            if (data.type === 'root') {
                div.classList.add('border-blue-500/50', 'bg-blue-500/10', 'scale-125', 'z-50');
                div.innerHTML = `<span class="font-black text-xs tracking-tighter text-blue-400 mb-1">INDONESIA</span><span class="font-bold text-sm leading-tight">${data.label}</span>`;
            } else if (data.type === 'cluster') {
                div.style.borderColor = data.color.replace(')', ', 0.3)');
                div.innerHTML = `<span class="cluster-label mb-1" style="color: ${data.color}">Rumpun</span><span class="font-bold text-sm leading-tight">${data.label}</span>`;
            } else {
                div.classList.add('border-white/10', 'hover:border-white/40');
                div.innerHTML = `<span class="text-[9px] text-zinc-500 uppercase font-bold mb-1 tracking-widest">Masalah</span><span class="text-xs font-medium leading-relaxed">${data.label}</span>`;
            }

            div.style.left = `calc(50% + ${x}px)`;
            div.style.top = `calc(50% + ${y}px)`;
            div.style.transform = `translate(-50%, -50%)`;
            
            div.onclick = (e) => {
                e.stopPropagation();
                if (data.type !== 'root') showDetails(data);
            };
            nodesLayer.appendChild(div);
        }

        function drawPath(x1, y1, x2, y2, color) {
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const startX = window.innerWidth / 2 + x1;
            const startY = window.innerHeight / 2 + y1;
            const endX = window.innerWidth / 2 + x2;
            const endY = window.innerHeight / 2 + y2;

            const cp1x = startX + (endX - startX) * 0.5;
            const cp2x = startX + (endX - startX) * 0.5;
            
            path.setAttribute("d", `M ${startX} ${startY} C ${cp1x} ${startY}, ${cp2x} ${endY}, ${endX} ${endY}`);
            path.setAttribute("class", "line-connector");
            path.style.stroke = color;
            svg.appendChild(path);
        }

        function showDetails(data) {
            const content = document.getElementById('drawer-content');
            const badge = document.getElementById('drawer-badge');
            
            const isCluster = data.type === 'cluster';
            badge.style.backgroundColor = isCluster ? 'rgba(255,255,255,0.1)' : 'rgba(255,69,58,0.1)';
            badge.style.color = isCluster ? '#fff' : 'var(--accent-red)';
            badge.innerText = isCluster ? 'OVERVIEW RUMPUN' : 'ANALISIS MASALAH';

            let html = `<h2 class="text-3xl font-bold mb-6 leading-tight">${data.label.replace('\n', ' ')}</h2>`;
            
            if (data.description) {
                html += `<p class="text-zinc-400 text-lg leading-relaxed mb-8">${data.description}</p>`;
            }

            if (data.causes) {
                html += `
                    <div class="mb-10">
                        <h3 class="text-[10px] font-black uppercase text-zinc-500 mb-4 tracking-[0.2em]">Akar Penyebab</h3>
                        <div class="space-y-4">
                            ${data.causes.map(c => `<div class="flex gap-4 text-sm text-zinc-300 bg-white/[0.03] p-4 rounded-2xl border border-white/5"><i data-lucide="alert-circle" class="w-5 h-5 text-red-500/50 shrink-0"></i>${c}</div>`).join('')}
                        </div>
                    </div>`;
            }

            if (data.impact) {
                html += `
                    <div class="mb-10">
                        <h3 class="text-[10px] font-black uppercase text-zinc-500 mb-4 tracking-[0.2em]">Dampak Nyata</h3>
                        <div class="flex flex-wrap gap-2">
                            ${data.impact.map(i => `<span class="px-4 py-2 bg-red-500/5 border border-red-500/10 rounded-xl text-xs text-red-300/80">${i}</span>`).join('')}
                        </div>
                    </div>`;
            }

            if (data.solutions) {
                html += `
                    <div class="mb-10">
                        <h3 class="text-[10px] font-black uppercase text-zinc-500 mb-4 tracking-[0.2em]">Langkah Solutif</h3>
                        <div class="space-y-4">
                            ${data.solutions.map((s, idx) => `
                                <div class="flex gap-4 items-center bg-green-500/5 border border-green-500/10 p-5 rounded-2xl">
                                    <div class="w-8 h-8 rounded-full bg-green-500/20 text-green-400 flex items-center justify-center shrink-0 font-bold text-xs">${idx+1}</div>
                                    <div class="text-sm font-medium text-green-100/90">${s}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }

            content.innerHTML = html;
            lucide.createIcons();
            drawer.classList.add('open');
        }

        function setupEvents() {
            // Fix Zoom: Disabled when mouse is over drawer
            window.addEventListener('wheel', (e) => {
                if (e.target.closest('#detail-drawer')) return;
                e.preventDefault();
                const delta = e.deltaY * -0.0008;
                zoom = Math.min(Math.max(0.3, zoom + delta), 2);
                updateTransform();
            }, { passive: false });

            // Pan
            window.addEventListener('mousedown', (e) => {
                if (e.target.closest('.glass') || e.target.closest('.node')) return;
                isDragging = true;
                startPan = { x: e.clientX - offset.x, y: e.clientY - offset.y };
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                offset.x = e.clientX - startPan.x;
                offset.y = e.clientY - startPan.y;
                updateTransform();
            });

            window.addEventListener('mouseup', () => isDragging = false);

            // Search
            document.getElementById('search-input').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.node').forEach(node => {
                    const isMatch = term && node.innerText.toLowerCase().includes(term);
                    node.classList.toggle('search-highlight', isMatch);
                });
            });

            document.getElementById('close-drawer').onclick = () => drawer.classList.remove('open');
            document.getElementById('focus-toggle').onclick = () => document.body.classList.toggle('focus-mode');
        }

        function updateTransform() {
            container.style.transform = `translate(${offset.x}px, ${offset.y}px) scale(${zoom})`;
        }

        function adjustZoom(val) {
            zoom = Math.min(Math.max(0.3, zoom + val), 2);
            updateTransform();
        }

        function resetView() {
            zoom = 0.9; offset = { x: 0, y: 0 };
            updateTransform();
        }

        window.addEventListener('resize', render);
        init();
    </script>
</body>
</html>
